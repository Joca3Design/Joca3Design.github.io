<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layered 3D Instagram Grid</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap" rel="stylesheet">
    
    <!--BASE-->
    
    <style>
        :root {
            --bg-color: #d8d8d8; /* Slightly darker to make shadows pop */
            --card-bg: #ffffff;
            --insta-blue: #8faed1;
            --card-width: 280px;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        .scene {
            perspective: 2000px; /* Increased perspective for deeper depth */
            display: flex;
            justify-content: space-around;
            align-items: center;
            overflow: hidden;
            width: 100%;
            zoom: 110%;
        }

        .carousel-track {
            contain: paint; /* Massive performance boost for scrolling grids */
            backface-visibility: hidden;
            display: grid;
            grid-template-columns: repeat(6, var(--card-width));
            gap: 40px;
            
            /* Tilted 3D perspective */
            transform: rotateX(35deg) rotateZ(-15deg) translateY(-20%);
            
            /* Infinite movement */
            animation: scrollDown 40s linear infinite; /* Slowed down to appreciate the effects */
            transition: animation-play-state 0.3s;
            contain: paint; /* Layout optimization */

        }

        .carousel-track:hover {
            animation-play-state: paused;
        }

        @keyframes scrollDown {
            0% { transform: rotateX(35deg) rotateZ(-15deg) translateY(-40%); }
            100% { transform: rotateX(35deg) rotateZ(-15deg) translateY(0%); }
        }

        /* --- THE POST CARD --- */
        .post-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            backface-visibility: hidden;

            /* EFFECT 1: Deeper Static Drop Shadow for the Card */
            box-shadow: 0 15px 40px rgba(0,0,0,0.18); 

            /* CRITICAL: Allows child elements (the image) to have their own Z-space */
            transform-style: preserve-3d;
            
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .post-header {
            font-weight: 600;
            font-family: 'Kaushan script';
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #333;
            /* Subtly lift text above card surface */
            transform: translateZ(5px);
        }

        /* --- THE IMAGE PLACEHOLDER --- */
        .image-placeholder {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: var(--insta-blue);
            border-radius: 4px;
            margin-bottom: 12px;

            /* EFFECT 2: Static Drop Shadow for the Image (resting on the card) */
            box-shadow: 0 5px 15px rgba(0,0,0,0.15); 

            /* Add base separation and transition for interaction */
            transform: translateZ(10px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            background-size: cover;
        }

        .post-footer {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            /* Subtly lift icons */
            transform: translateZ(5px);
        }

        /* --- GLOBAL BLUR EFFECT ON TRACK HOVER --- */
       .carousel-track:hover .post-card {
    opacity: 0.3;
    transform: scale(0.95);
}

        /* --- ACTIVE CARD INTERACTIONS (When Hovering Specific Card) --- */
        .carousel-track .post-card:hover {
            filter: blur(0);
            opacity: 1;
            z-index: 1000;

            /* PHASE 1: Lift the entire card base high above the grid */
            transform: scale(1.2) translateZ(180px); 

            /* EFFECT 1 Update: Extreme deep shadow for floating card */
            box-shadow: 0 50px 100px rgba(0,0,0,0.35); 
        }

        /* PHASE 2: Move the image placeholder higher relative to the card */
        .carousel-track .post-card:hover .image-placeholder {
            /* Now separated by 70px from the card surface, which is itself at 180px */
            transform: translateZ(38px) translateX(11px) translateY(-32px) scale(1.02);
            /* EFFECT 2 Update: Enhance image shadow to match its separation */
            filter: drop-shadow(-15px 28px 7px #0004); 
            transition: .3s ease-in;
        }
        
        @media (max-width: 768px) {
            .scene{
                zoom: 60%;
                justify-content: center;
            }
        }

        /* Add this to the CSS of your iframe page */
        html, body {
            cursor: none !important;
        }

        .post-card, .image-placeholder {
            /* Force hardware acceleration */
            transform: translateZ(0); 
        }
    </style>

</head>
<body>

    <div class="scene">
        <div class="carousel-track" id="track">
            <div id="image-grid" class="adaptive-grid"></div>
        </div>
    </div>

    <script>
        const track = document.getElementById('track');

// 1. ADD YOUR IMAGE URLS HERE
const myImages = [
    '/Imagenes/Diseño/Redes Sociales/1.jpg',
    '/Imagenes/Diseño/Redes Sociales/2.jpg',
    '/Imagenes/Diseño/Redes Sociales/3.jpg',
    '/Imagenes/Diseño/Redes Sociales/4.png',
    '/Imagenes/Diseño/Redes Sociales/5.gif',
    '/Imagenes/Diseño/Redes Sociales/6.png',
    '/Imagenes/Diseño/Redes Sociales/7.png',
    '/Imagenes/Diseño/Redes Sociales/8.gif'


    // Add as many as you want. 
    // If you add 2, they repeat. If you add 10, they repeat less.
];

// 2. Function to create a single card with a specific image
function createCard(imgUrl) {
    return `
        <div class="post-card">
            <div class="post-header">Instagram</div>
            <div class="image-placeholder" style="background-image: url('${imgUrl}')"></div>
            <div class="post-footer">
                <span>
                    <i class="fa fa-heart" aria-hidden="true" style="color: red;"></i> 
                    <i class="fa fa-comment-o" aria-hidden="true"></i>
                    <i class="fa fa-paper-plane-o" aria-hidden="true"></i>
                </span>
                <span><i class="fa fa-bookmark-o" aria-hidden="true"></i></span>
            </div>
        </div>
    `;
}

// 3. Logic to distribute images evenly and randomly
let totalSlots = 30;
let finalImagePool = [];

for (let i = 0; i < totalSlots; i++) {
    // This uses the modulo operator (%) to loop through your image array 
    // ensuring an even count across the 60 slots.
    finalImagePool.push(myImages[i % myImages.length]);
}

// 4. Shuffle the pool so they appear randomly across the grid
finalImagePool.sort(() => Math.random() - 0.5);

// 5. Generate the HTML
let cardHTML = '';
finalImagePool.forEach(img => {
    cardHTML += createCard(img);
});

// Fill the track and double it for the infinite loop illusion
track.innerHTML = cardHTML + cardHTML;
    </script>
</body>
</html>
